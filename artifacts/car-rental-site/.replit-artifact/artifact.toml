kind = "web"
previewPath = "/"
title = "Car Rental & Tours Website"
version = "1.0.0"
id = "artifacts/car-rental-site"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24100

[services.development]
run = "pnpm --filter @workspace/car-rental-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/car-rental-site", "run", "build" ]
serve = "static"
publicDir = "artifacts/car-rental-site/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24100"
BASE_PATH = "/"
